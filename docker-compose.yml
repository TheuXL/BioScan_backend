version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bioscan-backend
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3000
      - MONGODB_URI=mongodb://mongodb:27017/BioScanDB
      - MAP_KEY=${MAP_KEY}
      - OPENAQ_API_KEY=${OPENAQ_API_KEY}
      - GFW_API_KEY=${GFW_API_KEY}
      - GFW_API_ORIGIN=${GFW_API_ORIGIN}
      - SEA_LEVEL_DATA_URL=${SEA_LEVEL_DATA_URL}
      - SEA_LEVEL_ALLOW_BUNDLED_FALLBACK=${SEA_LEVEL_ALLOW_BUNDLED_FALLBACK}
      - EXTINCTION_GBIF_MAX_RECORDS_PER_SYNC=${EXTINCTION_GBIF_MAX_RECORDS_PER_SYNC}
      - EXTINCTION_GBIF_PAGE_SIZE=${EXTINCTION_GBIF_PAGE_SIZE}
      - EXTINCTION_GBIF_IUCN_CATEGORIES=${EXTINCTION_GBIF_IUCN_CATEGORIES}
    command: npm run dev
    restart: unless-stopped
    depends_on:
      - mongodb

  mongodb:
    image: mongo:latest
    container_name: bioscan-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

volumes:
  mongodb_data: 